<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuasarQuiz | Login & Register</title>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/your-your-kit-code.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="loginpage.css">
</head>
<body>
    <nav class="navbar">
        <div class="navcontainer">
            <div class="logo"><span>Q</span>uasarQuiz</div>
        </div>
    </nav>

    <div class="container" id="container">
        <!-- LOGIN FORM -->
        <div class="formbox login">
            <form id="loginForm">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" id="loginBtn" class="btn">Login</button>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div class="formbox signup">
            <form id="signupForm">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" id="regUsername" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="regPassword" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" id="signupBtn" class="btn">Register</button>
            </form>
        </div>

        <div class="togglebox">
            <div class="togglepanel toggleleft">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn signupbtn">Register</button>
            </div>
            <div class="togglepanel toggleright">
                <h1>Welcome back!</h1>
                <p>Already have an account?</p>
                <button class="btn loginbtn">Login</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE CORE SDK (REQUIRED) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- FIREBASE AUTHENTICATION (REQUIRED) -->

</body>
